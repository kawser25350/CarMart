
{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block title %}Home{% endblock %}

{% block content %}

{% include 'home/header.html' %}

<div class="container d-flex justify-content-center align-items-center">
    
    
    
    
    <form action="" method="POST" class=" shadow shadow-lg rounded-3  ">
        <h1 class=" text-center"> Car Details </h1>
        <div class="card mb-3 p-3">
            <img class="card-img-top" src="{{car.image.url}}"  alt="Card image cap">
            <div class="card-body">
                <h5 class="card-title">{{car.model}}</h5>
               
            </div>
        </div>
        <button  class="btn btn-success w-100 "   type="submit" class="w-100">Make Payment</button>
    </form>
    
    
</div>
{% endblock %}
